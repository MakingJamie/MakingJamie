name: Update README with latest writing

# Refreshes two self-updating regions of README.md:
#   - the BLOG-POST-LIST markers, from the site's Atom feed
#   - the STILLMIND-RELEASES markers, from the App Store + Google Play
# Runs daily, on demand, and on push (so the first push seeds it). Makes a single
# commit, and only when something actually changed.
#
# Security note: the `run:` steps use only static, author-controlled inputs (the
# feed URL/template baked into the action, the store IDs hard-coded in
# scripts/build-releases.sh, and the GITHUB_REF_NAME env var). No
# github.event.* values are interpolated into any command. The store HTTP
# responses are untrusted and are parsed for a version string / known store URL
# via strict regex only — never executed. The commit step adds only README.md.
on:
  schedule:
    - cron: "0 6 * * *" # daily, 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

# Serialise runs (shared with update-repos.yml) so the two README workflows can
# never race each other to the same `git push`. Queue the newer run instead of
# cancelling — we don't want to drop a refresh.
concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest posts from the Atom feed
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://jamie-murphy.com/atom.xml"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
          # Lead each item with the newline (not trail it) so the first post
          # drops onto its own line below the START marker — otherwise the
          # action glues item #1 to the marker and it won't render as a bullet.
          template: "$newline- [$title]($url)"
          # Only rewrite the file — the single commit step below handles commit
          # and a race-safe push for both regions at once.
          skip_commit: "true"

      - name: Refresh StillMind release versions
        run: bash scripts/build-releases.sh README.md

      - name: Commit & push if changed
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- README.md; then
            echo "README unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh profile (writing + StillMind releases)"
          # Race-safe push: if another commit (a manual push, or the repos
          # workflow) landed since checkout, rebase our single commit on top and
          # retry rather than failing with a non-fast-forward rejection.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing on origin/$REF_NAME (attempt $i)"
            git fetch origin "$REF_NAME"
            git rebase "origin/$REF_NAME" || { git rebase --abort; exit 1; }
            sleep $(( (RANDOM % 4) + 1 ))
          done
          echo "push failed after retries"
          exit 1
