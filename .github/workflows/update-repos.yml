name: Update README with public repositories

# Refreshes the list between the REPO-LIST markers in README.md from the GitHub
# API (my public, non-fork repos, most-starred then most-recent first). Runs
# daily, on demand, and on push.
#
# Security note: the github-script step reads only repository metadata via the
# authenticated API and writes a fixed-format list. No ${{ github.event.* }} or
# other untrusted input is interpolated into any run: command or the script;
# the commit step adds only the generated README.md.
on:
  schedule:
    - cron: "30 6 * * *" # daily, 06:30 UTC (offset from the writing job)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

# Share the concurrency group with the writing workflow so the two never race
# each other to the same git push.
concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render repository list into README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: 'owner',
              per_page: 100,
              sort: 'pushed',
            });
            const featured = repos
              .filter((r) => !r.fork && !r.private)
              .filter((r) => r.name.toLowerCase() !== owner.toLowerCase())
              .sort(
                (a, b) =>
                  b.stargazers_count - a.stargazers_count ||
                  new Date(b.pushed_at) - new Date(a.pushed_at),
              )
              .slice(0, 6);
            const lines = featured.map((r) => {
              const desc = r.description ? r.description.trim() : 'No description yet.';
              const meta = [
                r.language,
                r.stargazers_count ? `★ ${r.stargazers_count}` : null,
                r.archived ? 'archived' : null,
              ]
                .filter(Boolean)
                .join(' · ');
              const tail = meta ? ` \`${meta}\`` : '';
              return `- **[${r.name}](${r.html_url})** — ${desc}${tail}`;
            });
            const block = lines.length
              ? lines.join('\n')
              : '_No public repositories yet._';
            const path = 'README.md';
            const md = fs.readFileSync(path, 'utf8');
            const start = '<!-- REPO-LIST:START -->';
            const end = '<!-- REPO-LIST:END -->';
            const re = new RegExp(`${start}[\\s\\S]*?${end}`);
            fs.writeFileSync(path, md.replace(re, `${start}\n${block}\n${end}`));
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh repositories"
            git push
          fi
